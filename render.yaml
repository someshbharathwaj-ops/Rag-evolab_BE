services:
  - type: web
    name: rag-evolab-be
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: QUERY_TIMEOUT_SECONDS
        value: 45
      - key: OLLAMA_TIMEOUT_SECONDS
        value: 30
      - key: EMBEDDING_BACKEND
        value: hash
      - key: USE_WEAVIATE
        value: "false"
